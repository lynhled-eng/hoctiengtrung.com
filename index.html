<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HSK Pro - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        /* Giữ nguyên phần CSS của mày */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f9fc; color: #333; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; padding: 30px 20px; height: 100%; }
        .logo { font-size: 24px; font-weight: bold; color: #8e44ad; margin-bottom: 50px; text-align: center; }
        .menu-item { display: flex; align-items: center; padding: 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: #666; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background-color: #f0e7f6; color: #8e44ad; font-weight: bold; }
        .menu-icon { margin-right: 15px; font-size: 18px; }
        .main-container { flex: 1; display: flex; flex-direction: column; }
        .topbar { height: 80px; background-color: #fff; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .streak-info { background: linear-gradient(135deg, #ff9a00, #ff5a00); color: white; padding: 8px 20px; border-radius: 50px; font-weight: bold; }
        .main-content { flex: 1; position: relative; background-color: #f7f9fc; }
        #content-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        input { padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">luyentu.com</div>
        <div class="menu-item active" onclick="changePage('botuvung.html', this)">
            <span class="menu-icon">📚</span> Bộ từ vựng
        </div>
        <div class="menu-item" onclick="changePage('game_phan_xa.html', this)">
            <span class="menu-icon">🎮</span> Game phản xạ
        </div>
        <div class="menu-item" onclick="changePage('xep_hang.html', this)">
            <span class="menu-icon">🏆</span> Xếp hạng
        </div>
        <div style="margin-top: auto;">
            <div class="menu-item" style="color: #ff7675;" onclick="logout()">
                <span class="menu-icon">🚪</span> Đăng xuất
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="topbar">
            <div id="auth-section">
                <div id="login-form" style="display: flex; gap: 8px;">
                    <input type="email" id="login-email" placeholder="Email của mày...">
                    <input type="password" id="login-pass" placeholder="Mật khẩu..." style="width: 120px;">
                    <button onclick="loginWithEmail()" style="background: #8e44ad; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;">
                        VÀO HỌC
                    </button>
                    <button onclick="registerWithEmail()" style="background: none; color: #8e44ad; border: 1px solid #8e44ad; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 500;">
                        ĐĂNG KÝ
                    </button>
                </div>
                <div id="user-logged" style="display: none; align-items: center; gap: 15px;">
                    <span id="user-name" style="font-weight: 600; color: #8e44ad;">Đang tải...</span>
                </div>
            </div>

            <div class="streak-info">
                <span>🔥 1 ngày</span>
            </div>
        </div>

        <div class="main-content">
            <iframe id="content-frame" src="botuvung.html"></iframe>
        </div>
    </div>

    <script>
        // 2. CẤU HÌNH FIREBASE (Mày nhớ thay bằng cái Config trong Console Firebase của mày nhé)
        const firebaseConfig = {
          apiKey: "AIzaSyDYy8tU8RAFnExChBdKeFTaONmukvJfUo4",
          authDomain: "hsk---pro.firebaseapp.com",
          projectId: "hsk---pro",
          storageBucket: "hsk---pro.firebasestorage.app",
          messagingSenderId: "66175828693",
          appId: "1:66175828693:web:ffef9f68312d37de79985c",
          measurementId: "G-7MGB4CHQ1W"
        };
        firebase.initializeApp(firebaseConfig);

        // Hàm Đăng Ký (Mày vừa thiếu cái này)
        async function registerWithEmail() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if (!email || !pass) return alert("Điền đủ mới tạo nick được chứ Hoa!");
            
            try {
                await firebase.auth().createUserWithEmailAndPassword(email, pass);
                alert("Đăng ký thành công rồi! Học thôi.");
            } catch (error) {
                alert("Lỗi đăng ký: " + error.message);
            }
        }

        async function loginWithEmail() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            if (!email || !pass) {
                alert("Gõ đủ Email với Pass vào Hoa ơi!");
                return;
            }

            try {
                await firebase.auth().signInWithEmailAndPassword(email, pass);
            } catch (error) {
                alert("Lỗi rồi: " + error.message);
            }
        }

        // Lắng nghe trạng thái đăng nhập để update UI và reload bộ từ
        firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('user-logged').style.display = 'flex';
        
        const nickname = user.email.split('@')[0];
        document.getElementById('user-name').innerText = nickname + " 👋";

        // --- ĐOẠN QUAN TRỌNG: BỐC DỮ LIỆU TỪ MÂY VỀ ---
        // Tao sẽ dùng Firestore để lấy lại tiến độ
        const db = firebase.firestore(); 
        
        for (let i = 1; i <= 9; i++) {
            try {
                // Mò lên địa chỉ users/ID_CUA_MAY/progress/lvX
                const docRef = db.collection("users").doc(user.uid).collection("progress").doc(`lv${i}`);
                const docSnap = await docRef.get();

                if (docSnap.exists) {
                    // Nếu trên mây có dữ liệu, vả nó vào localStorage của máy luôn
                    localStorage.setItem(`hsk_progress_lv${i}`, JSON.stringify(docSnap.data()));
                }
            } catch (e) {
                console.log("Bộ HSK " + i + " chưa có dữ liệu trên mây.");
            }
        }

        // Sau khi nạp xong hết vào máy, bảo cái iframe load lại để hiện số chuẩn
        document.getElementById('content-frame').contentWindow.location.reload();

    } else {
        document.getElementById('login-form').style.display = 'flex';
        document.getElementById('user-logged').style.display = 'none';
    }
});

        function changePage(pageUrl, element) {
            document.getElementById('content-frame').src = pageUrl;
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }

        function logout() {
    // Bốc cái tên đang hiện ở trên màn hình ra
    const currentName = document.getElementById('user-name').innerText.replace(' 👋', '');
    
    if(confirm("Mày muốn thoát à " + currentName + "?")) {
        firebase.auth().signOut().then(() => {
            localStorage.clear(); // Xóa sạch dữ liệu máy khi thoát
            location.reload();
        });
    }
}
    </script>
</body>
</html>
